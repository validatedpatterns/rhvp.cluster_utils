---
- name: >-
    Check for secrets namespace {{ item.metadata.namespace | default('unknown') }}
    ({{ k8s_secret_namespace_check_retries | default(5) }} attempts)
  no_log: '{{ hide_sensitive_output | default(true) }}'
  kubernetes.core.k8s_info:
    kind: Namespace
    name: "{{ item['metadata']['namespace'] }}"
  register: secrets_ns_rc
  until: secrets_ns_rc.resources | length > 0
  retries: "{{ k8s_secret_namespace_check_retries | default(5) | int }}"
  delay: "{{ k8s_secret_namespace_check_delay | default(45) | int }}"

- name: >-
    Report namespace ready for {{ item.kind | default('Secret') }} {{ item.metadata.name | default('unknown') }}
    (namespace {{ item.metadata.namespace | default('unknown') }})
  ansible.builtin.debug:
    msg: >-
      Namespace '{{ item.metadata.namespace | default('unknown') }}' is ready for
      {{ item.kind | default('Secret') }} '{{ item.metadata.name | default('unknown') }}'.

- name: >-
    Inject Kubernetes {{ item.kind | default('Secret') }} {{ item.metadata.name | default('unknown') }} in namespace
    {{ item.metadata.namespace | default('unknown') }}
  no_log: '{{ hide_sensitive_output | default(true) }}'
  kubernetes.core.k8s:
    definition: '{{ item }}'
    wait: true
  register: k8s_secret_apply_result
  changed_when: k8s_secret_apply_result is changed

- name: >-
    Report {{ item.kind | default('Secret') }} apply result for {{ item.metadata.namespace | default('unknown') }}/
    {{ item.metadata.name | default('unknown') }}
  ansible.builtin.debug:
    msg: >-
      Applied {{ item.kind | default('Secret') }} namespace='{{ item.metadata.namespace | default('unknown') }}'
      name='{{ item.metadata.name | default('unknown') }}' (changed={{ k8s_secret_apply_result.changed | default(false) }}).
