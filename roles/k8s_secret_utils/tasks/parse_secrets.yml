---
- name: Cache values-secrets as YAML for v2 inline bootstrap detection
  ansible.builtin.set_fact:
    secrets_yaml: "{{ values_secrets_data if values_secrets_data is not string else values_secrets_data | from_yaml }}"

- name: Detect inline bootstrap secrets in primary v2 file
  ansible.builtin.set_fact:
    _vp_has_inline_bootstrap_secrets: >-
      {{
        (secrets_yaml.version | default('2.0')) is version('2.0', '>=')
        and (
          (secrets_yaml.secrets | default([])
          | selectattr('bootstrap', 'defined')
          | selectattr('bootstrap')
          | list
          | length) > 0
        )
      }}

- name: Parse and inject inline bootstrap secrets from primary file (v2)
  when: _vp_has_inline_bootstrap_secrets | bool
  block:
    - name: Parse primary file bootstrap-only secrets for none backend
      no_log: '{{ hide_sensitive_output | default(true) }}'
      parse_secrets_info:
        values_secrets_plaintext: "{{ values_secrets_data }}"
        secrets_backing_store: none
        secrets_parse_filter: bootstrap_only
      register: inline_bootstrap_secrets_results

    - name: Inject inline bootstrap secrets into the cluster
      ansible.builtin.include_tasks: inject_k8s_secrets.yml
      vars:
        kubernetes_secret_objects: "{{ inline_bootstrap_secrets_results.kubernetes_secret_objects }}"
      when: inline_bootstrap_secrets_results.parsed_secrets | length > 0

- name: Parse secrets data
  no_log: '{{ hide_sensitive_output | default(true) }}'
  parse_secrets_info:
    values_secrets_plaintext: "{{ values_secrets_data }}"
    secrets_backing_store: "{{ secrets_backing_store }}"
  register: secrets_results

- name: Return kubernetes objects
  no_log: '{{ hide_sensitive_output | default(true) }}'
  ansible.builtin.set_fact:
    kubernetes_secret_objects: "{{ secrets_results['kubernetes_secret_objects'] }}"
