---
# Early (bootstrap) phase: create target namespaces if missing. Late phase: namespaces must already exist.
- name: Ensure bootstrap target namespaces exist
  when:
    - secrets_install_phase | default('late') == 'early'
    - kubernetes_secret_objects | length > 0
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop: "{{ kubernetes_secret_objects | map(attribute='metadata') | map(attribute='namespace') | unique | list }}"

- name: Inject secrets
  no_log: '{{ hide_sensitive_output | default(True) }}'
  ansible.builtin.include_tasks: inject_k8s_secret.yml
  loop: '{{ kubernetes_secret_objects }}'
