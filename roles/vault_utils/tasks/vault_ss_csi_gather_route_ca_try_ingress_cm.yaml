---
# Try one ConfigMap in openshift-ingress (or vault_ss_csi_route_ca_ingress_namespace) for PEM trust material.
# Sets _rhvp_router_pem when a usable value is found. Requires _rhvp_ingress_cm_name and _rhvp_ingress_data_keys.
- name: Read ingress TLS trust ConfigMap candidate (hub)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    namespace: "{{ vault_ss_csi_route_ca_ingress_namespace }}"
    name: "{{ _rhvp_ingress_cm_name }}"
  register: _rhvp_ingress_cm_candidate
  failed_when: false

- name: Set route TLS PEM from candidate ConfigMap (first matching data key)
  ansible.builtin.set_fact:
    _rhvp_router_pem: "{{ _rhvp_ingress_cm_candidate.resources[0].data[item] }}"
  loop: "{{ _rhvp_ingress_data_keys }}"
  when:
    - (_rhvp_router_pem | default('') | length) == 0
    - (_rhvp_ingress_cm_candidate.resources | default([]) | length) > 0
    - item in (_rhvp_ingress_cm_candidate.resources[0].data | default({}))

- name: Set route TLS PEM from first PEM-like value in candidate ConfigMap
  ansible.builtin.set_fact:
    _rhvp_router_pem: "{{ item }}"
  loop: "{{ _rhvp_ingress_cm_candidate.resources[0].data.values() | list | default([]) }}"
  when:
    - (_rhvp_router_pem | default('') | length) == 0
    - (_rhvp_ingress_cm_candidate.resources | default([]) | length) > 0
    - item is string
    - ("BEGIN CERTIFICATE" in item) or ("BEGIN TRUSTED CERTIFICATE" in item)
