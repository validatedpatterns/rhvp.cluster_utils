---
# Same trust bundle as the hub (Vault route is on hub ingress); required on spoke for Vault CSI → hub Vault HTTPS.
- name: Build spoke namespace list for Vault route CA ConfigMap
  ansible.builtin.set_fact:
    _ss_csi_route_ca_spoke_namespaces: "{{ ([vault_ns] + ((_ss_rows_this_cluster | default([])) | map(attribute='namespace') | list)) | unique }}"

- name: Ensure Vault route CA ConfigMap on spoke cluster namespaces (SS CSI)
  kubernetes.core.k8s:
    state: present
    api_key: "{{ cluster_loop.value['bearerToken'] }}"
    host: "{{ cluster_loop.value['server_api'] }}"
    ca_cert: "/tmp/{{ cluster_loop.key }}.ca"
    validate_certs: "{{ validate_certs_api_endpoint }}"
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ vault_ss_csi_route_ca_configmap_name }}"
        namespace: "{{ item }}"
        labels:
          app.kubernetes.io/name: rhvp-cluster-utils
          app.kubernetes.io/component: vault-route-tls-ca
      data:
        "{{ vault_ss_csi_route_ca_configmap_key }}": "{{ _vault_route_ca_pem }}"
  loop: "{{ _ss_csi_route_ca_spoke_namespaces }}"
  loop_control:
    label: "{{ cluster_loop.key }}/{{ item }}"
  when:
    - cluster_loop.value['bearerToken'] is defined
    - cluster_loop.value['server_api'] is defined
    - cluster_loop.key != "local-cluster"
