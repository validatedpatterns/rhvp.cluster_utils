---
# Build a PEM bundle that trusts the hub OpenShift apps ingress (Vault route TLS).
# Used by vault_ss_csi_apply_route_ca_configmap_* so GitOps/Helm can use createConfigMap: false
# + pemLiteral-free values; openshift-sscsi-vault SPC vaultCACertPath points at the mounted file.
- name: Build ordered list of ingress ConfigMap data keys to try
  ansible.builtin.set_fact:
    _rhvp_ingress_data_keys: >-
      {{
        (
          [vault_ss_csi_route_ca_ingress_data_key | default('ca-bundle.crt')]
          + (vault_ss_csi_route_ca_ingress_data_keys | default([]))
        ) | unique | list
      }}

- name: Build ordered list of ingress namespace ConfigMaps to try for Vault route TLS
  ansible.builtin.set_fact:
    _rhvp_ingress_cm_names: >-
      {{
        (
          [vault_ss_csi_route_ca_ingress_configmap_primary | default('router-ca'),
           vault_ss_csi_route_ca_ingress_configmap_fallback | default('router-ca-certs')]
          + (vault_ss_csi_route_ca_ingress_configmap_candidates | default([]))
        ) | unique | list
      }}

- name: Try each ingress ConfigMap for route TLS trust material
  ansible.builtin.include_tasks: vault_ss_csi_gather_route_ca_try_ingress_cm.yaml
  loop: "{{ _rhvp_ingress_cm_names }}"
  loop_control:
    loop_var: _rhvp_ingress_cm_name
  when: (_rhvp_router_pem | default('') | length) == 0

- name: Optionally read kube-root-ca from external-secrets (hub) for bundle parity with ESO
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    namespace: "{{ vault_ss_csi_route_ca_kube_root_namespace }}"
    name: "{{ vault_ss_csi_route_ca_kube_root_name }}"
  register: _rhvp_kube_root_cm
  when: vault_ss_csi_route_ca_include_kube_root | default(true) | bool
  failed_when: false

- name: Set kube-root PEM fragment
  ansible.builtin.set_fact:
    _rhvp_kube_root_pem: "{{ _rhvp_kube_root_cm.resources[0].data[vault_ss_csi_route_ca_kube_root_key] }}"
  when:
    - vault_ss_csi_route_ca_include_kube_root | default(true) | bool
    - _rhvp_kube_root_cm is defined
    - (_rhvp_kube_root_cm.resources | default([]) | length) > 0
    - vault_ss_csi_route_ca_kube_root_key in (_rhvp_kube_root_cm.resources[0].data | default({}))

- name: Compose combined Vault route trust bundle
  ansible.builtin.set_fact:
    _vault_route_ca_pem: >-
      {{ (_rhvp_router_pem | default('') | trim) ~ (
      ('\n' ~ (_rhvp_kube_root_pem | trim))
      if ((_rhvp_kube_root_pem | default('') | trim) | length) > 0 else ''
      ) }}

- name: Fail when ingress route TLS trust material could not be read (SS CSI TLS bundle)
  ansible.builtin.fail:
    msg: >-
      Could not read Vault route TLS trust from any ConfigMap in {{ vault_ss_csi_route_ca_ingress_namespace }}.
      Tried (in order): {{ _rhvp_ingress_cm_names | join(', ') }} with data keys: {{ _rhvp_ingress_data_keys | join(', ') }}.
      Inspect: oc get configmap -n {{ vault_ss_csi_route_ca_ingress_namespace }} -o name
      and set vault_ss_csi_route_ca_ingress_configmap_candidates or vault_ss_csi_route_ca_ingress_data_keys as needed.
      Cannot populate Vault route CA ConfigMaps for CSI.
  when:
    - vault_ss_csi_inject_route_ca_configmap | default(true) | bool
    - (_rhvp_router_pem | default('') | trim | length) == 0
