---
# defaults file for vault_utils
values_secret: "{{ lookup('env', 'HOME') }}/values-secret.yaml"
kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"
kubeconfig_backup: "{{ lookup('env', 'HOME') }}/.kube/config"
vault_ns: "vault"
vault_pod: "vault-0"
vault_hub: "hub"
vault_pvc: "data-vault-0"
vault_hub_kubernetes_host: https://$KUBERNETES_PORT_443_TCP_ADDR:443
# Needs extra escaping due to how it gets injected via shell in the vault
vault_hub_capabilities: '[\\\"read\\\"]'
vault_base_path: "secret"
vault_path: "{{ vault_base_path }}/{{ vault_hub }}"
vault_hub_ttl: "15m"
vault_spoke_capabilities: '[\\\"read\\\"]'
vault_spoke_ttl: "15m"
vault_global_policy: global
vault_global_capabilities: '[\\\"read\\\"]'
vault_pushsecrets_policy: pushsecrets
vault_pushsecrets_capabilities: '[\\\"create\\\",\\\"read\\\",\\\"update\\\",\\\"delete\\\"]'
legacy_external_secrets_ns: golang-external-secrets
legacy_external_secrets_sa: golang-external-secrets
legacy_external_secrets_secret: golang-external-secrets
external_secrets_ns: external-secrets
# The service account cannot be called "external-secrets" as that SA is used by the downstream ESO
external_secrets_sa: ocp-external-secrets
external_secrets_secret: ocp-external-secrets
unseal_secret: "vaultkeys"
unseal_namespace: "imperative"
vault_jwt_config: false
vault_jwt_roles: []

# Default policies that VP framework requires for hub-role
# Patterns can extend this list but these are always included
vault_hub_role_default_policies:
  - default
  - "{{ vault_global_policy }}-secret"
  - "{{ vault_pushsecrets_policy }}-secret"
  - "{{ vault_hub }}-secret"

# JWT auth policies for workloads needing direct Vault access
# List of {name: "policy-name", policy: "HCL policy content"}
vault_jwt_policies: []

# App-specific Vault policy configuration (vault_app_policies.yaml)
# List of app configs, each with 'prefix' and optional 'jwt_role' settings
# Example:
#   app_prefixes:
#     - prefix: apps/qtodo
#       jwt_role:
#         service_account_names: "qtodo-sa"
#         service_account_namespaces: "qtodo"
#         ttl: "15m"
#     - prefix: hub/infra/keycloak
app_prefixes: []
# Capabilities for app policies
app_capabilities: '[\"read\"]'
# Whether to update hub-role with new app policies
app_update_hub_role: true
# Whether to create JWT roles per app (only for entries with jwt_role defined)
app_create_jwt_roles: false

# Vault Secrets Store CSI: extra Kubernetes auth role on the hub mount (same policy set as hub-role)
vault_csi_kubernetes_auth: false
vault_csi_kubernetes_role_name: "{{ vault_hub }}-csi-role"
vault_csi_service_account_namespace: "secrets-store-csi-driver"
vault_csi_service_account_name: "secrets-store-csi-driver"
vault_csi_role_ttl: "15m"

# Pattern values (clustergroup): optional list ssCsiWorkloadAuth under each
#   clusterGroup.applications.<app>
# or under clusterGroup.managedClusterGroups.<group>.applications.<app>
# (see vault_ss_csi_* tasks). Example element:
#   { serviceAccount: my-sa, namespace: my-ns, cluster: <spoke>, optional roleSlug: stable suffix }
# namespace defaults to the application namespace; cluster defaults to hub for hub apps, or to
# managedClusterGroup.name (else the group YAML key) for applications declared under managedClusterGroups.
vault_ss_csi_from_applications: true
# Override path to values-<clustergroup>.yaml; empty uses pattern_dir/values-{{ main_clustergroupname }}.yaml
vault_ss_csi_cluster_values_file: ""
vault_ss_csi_role_ttl: "15m"
# How Vault names Kubernetes auth roles: auth/<mount>/role/<mount>-sscsi-<slug>
# - hash: legacy SHA1 of namespace|serviceAccount|app (hub) or vault_path|... (spoke)
# - stable_slug: hub-sscsi-<ns>-<sa>-<app> (sanitized); spokes prefix sanitized vault_path
# Per-entry override wins: ssCsiWorkloadAuth[].roleSlug (suffix only; still prefixed with <mount>-sscsi-)
vault_ss_csi_role_slug_mode: hash

# After vault unseal / during vault_secrets_init: copy hub ingress CA into predictable ConfigMaps for
# Vault CSI TLS (openshift-sscsi-vault defaults). Argo-friendly: no pemLiteral in Git; set
# syncProviderCaConfigMap.createConfigMap: false and mount this CM on the Vault CSI provider.
vault_ss_csi_inject_route_ca_configmap: true
vault_ss_csi_route_ca_configmap_name: openshift-sscsi-vault-vault-tls-ca
vault_ss_csi_route_ca_configmap_key: vault-tls-ca.pem
vault_ss_csi_route_ca_ingress_namespace: openshift-ingress
vault_ss_csi_route_ca_ingress_configmap_primary: router-ca
vault_ss_csi_route_ca_ingress_configmap_fallback: router-ca-certs
# Merged into _rhvp_ingress_data_keys first; some clusters use ca.crt only.
vault_ss_csi_route_ca_ingress_data_key: ca-bundle.crt
vault_ss_csi_route_ca_ingress_data_keys:
  - ca-bundle.crt
  - ca.crt
  - ingress-ca.crt
vault_ss_csi_route_ca_include_kube_root: true
vault_ss_csi_route_ca_kube_root_namespace: external-secrets
vault_ss_csi_route_ca_kube_root_name: kube-root-ca.crt
vault_ss_csi_route_ca_kube_root_key: ca.crt
