---
# Early Kubernetes inject only for v2 primary values-secret entries tagged with bootstrap.
# Fails if no primary file is found or the file has no bootstrap-tagged secrets.
- name: Run cluster pre-check before bootstrap-only secrets load
  ansible.builtin.include_role:
    name: cluster_pre_check

- name: Find and read primary values-secret file
  ansible.builtin.include_role:
    name: find_vp_secrets

- name: Require primary values-secret content
  ansible.builtin.assert:
    that:
      - values_secrets_data is defined
    fail_msg: >-
      No primary values-secret file was found or read. Set VALUES_SECRET to an existing file or install
      a file at one of the standard paths (see collection README).

- name: Inject bootstrap-tagged secrets from primary file (with retries)
  ansible.builtin.include_tasks: inject_early_bootstrap_primary_entries.yml

- name: Require at least one bootstrap-tagged secret in primary file
  ansible.builtin.assert:
    that:
      - _vp_has_inline_bootstrap_secrets | default(false) | bool
    fail_msg: >-
      No v2 secrets with bootstrap: true / bootstrap: only (or equivalent) were found in the primary
      values-secret file. Nothing to inject for bootstrap-only mode.
