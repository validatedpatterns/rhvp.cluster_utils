---
- name: Discover optional bootstrap values-secret file
  ansible.builtin.include_role:
    name: find_vp_secrets
    tasks_from: find_optional_bootstrap.yml

- name: Note missing optional bootstrap values-secret file
  ansible.builtin.debug:
    msg: No bootstrap values-secret file was found (optional). Proceeding with standard secrets loading only.
  when: not (vp_bootstrap_secrets_present | default(false) | bool)

- name: Note optional bootstrap values-secret file found
  ansible.builtin.debug:
    msg: >-
      Found bootstrap values-secret at {{ found_bootstrap_file }}; loading with the none backend
      (up to {{ vp_secrets_bootstrap_retry_max | default(20) }} attempt(s),
      {{ vp_secrets_bootstrap_retry_delay | default(30) }}s between retries on failure).
  when: vp_bootstrap_secrets_present | default(false) | bool

- name: Skip VALUES_SECRET for primary search when bootstrap consumed that path
  ansible.builtin.set_fact:
    vp_skip_values_secret_env_for_primary: true
  when:
    - vp_bootstrap_secrets_present | default(false) | bool
    - vp_bootstrap_loaded_via_values_secret_env | default(false) | bool

- name: Initialize bootstrap secrets inject attempt counter
  ansible.builtin.set_fact:
    _bootstrap_inject_attempt: 1
  when: vp_bootstrap_secrets_present | default(false) | bool

- name: Load bootstrap secrets into the cluster with retries on failure
  ansible.builtin.include_tasks: bootstrap_inject_retry.yml
  when: vp_bootstrap_secrets_present | default(false) | bool
