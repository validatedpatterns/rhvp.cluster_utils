---
# Expects: cluster_name, download_kubeconfigs_output_dir, download_kubeconfigs_force
- name: Process cluster {{ cluster_name }}
  block:
    - name: Reset per-cluster facts (avoid bleed between loop iterations)
      ansible.builtin.set_fact:
        kubeconfig_decoded: ""
        kubeconfig_written:
          changed: false
          skipped: true

    - name: Check existing kubeconfig file
      ansible.builtin.stat:
        path: "{{ download_kubeconfigs_output_dir }}/{{ cluster_name }}.yaml"
      register: kubeconfig_dest_stat

    - name: Skip when file exists and force is false
      when:
        - kubeconfig_dest_stat.stat.exists | bool
        - not (download_kubeconfigs_force | bool)
      ansible.builtin.debug:
        msg: "File {{ cluster_name }}.yaml already exists; set download_kubeconfigs_force=true to overwrite"

    - name: List secrets in cluster namespace
      when: (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ cluster_name }}"
      register: cluster_secrets

    - name: Pick kubeconfig secret (name contains admin-kubeconfig or kubeconfig)
      when: (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
      ansible.builtin.set_fact:
        kube_secret: >-
          {{
            cluster_secrets.resources
            | selectattr('metadata.name', 'search', 'admin-kubeconfig|kubeconfig')
            | list | first | default({})
          }}

    - name: Warn when no kubeconfig secret
      when:
        - (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
        - kube_secret | length == 0
      ansible.builtin.debug:
        msg: "No kubeconfig secret found for cluster {{ cluster_name }}, skipping"

    - name: Decode kubeconfig from secret .data.kubeconfig
      when:
        - (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
        - kube_secret | length > 0
        - kube_secret.data.kubeconfig | default('') | length > 0
      ansible.builtin.set_fact:
        kubeconfig_decoded: "{{ kube_secret.data.kubeconfig | b64decode }}"

    - name: Decode kubeconfig from secret .data.raw-kubeconfig
      when:
        - (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
        - kube_secret | length > 0
        - kubeconfig_decoded | default('') | length == 0
        - kube_secret.data['raw-kubeconfig'] | default('') | length > 0
      ansible.builtin.set_fact:
        kubeconfig_decoded: "{{ kube_secret.data['raw-kubeconfig'] | b64decode }}"

    - name: Warn when kubeconfig data empty
      when:
        - (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
        - kube_secret | length > 0
        - kubeconfig_decoded | default('') | length == 0
      ansible.builtin.debug:
        msg: "Could not extract kubeconfig data for cluster {{ cluster_name }}, skipping"

    - name: Write kubeconfig file
      when:
        - (download_kubeconfigs_force | bool) or not (kubeconfig_dest_stat.stat.exists | bool)
        - kube_secret | length > 0
        - kubeconfig_decoded | default('') | length > 0
      ansible.builtin.copy:
        content: "{{ kubeconfig_decoded }}"
        dest: "{{ download_kubeconfigs_output_dir }}/{{ cluster_name }}.yaml"
        mode: "0600"
      register: kubeconfig_written

    - name: Verify kubeconfig with oc get nodes
      when: kubeconfig_written.changed | default(false)
      ansible.builtin.command:
        argv:
          - oc
          - "--kubeconfig={{ download_kubeconfigs_output_dir }}/{{ cluster_name }}.yaml"
          - get
          - nodes
          - "--no-headers"
      register: oc_verify
      changed_when: false
      failed_when: false

    - name: Report successful download
      when: kubeconfig_written.changed | default(false) and oc_verify.rc == 0
      ansible.builtin.debug:
        msg:
          - "Downloaded kubeconfig for {{ cluster_name }} to {{ download_kubeconfigs_output_dir }}/{{ cluster_name }}.yaml"
          - "Node count: {{ oc_verify.stdout_lines | default([]) | length }}"

    - name: Report questionable kubeconfig
      when: kubeconfig_written.changed | default(false) and oc_verify.rc != 0
      ansible.builtin.debug:
        msg: >-
          Downloaded kubeconfig for {{ cluster_name }} but oc get nodes failed;
          file saved at {{ download_kubeconfigs_output_dir }}/{{ cluster_name }}.yaml
