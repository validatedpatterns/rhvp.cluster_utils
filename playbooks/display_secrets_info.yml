---
- name: Determine pattern directory
  ansible.builtin.import_playbook: ./determine_pattern_dir.yml

- name: Determine pattern name
  ansible.builtin.import_playbook: ./determine_pattern_name.yml

- name: Load values-global.yaml for secrets store
  ansible.builtin.import_playbook: ./load_values_global.yml

- name: Determine secrets store backend
  ansible.builtin.import_playbook: ./determine_secretstore_backend.yml

- name: Parse and display secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    hide_sensitive_output: false
  tasks:
    # Set the VALUES_SECRET environment variable to the file to parse
    - name: Find and decrypt secrets if needed
      ansible.builtin.include_role:
        name: find_vp_secrets

    # find_vp_secrets will return a plaintext data structure called values_secrets_data
    # This will allow us to determine schema version and which backend to use
    - name: Determine how to load secrets
      ansible.builtin.set_fact:
        secrets_yaml: "{{ values_secrets_data if values_secrets_data is not string else values_secrets_data | from_yaml }}"

    - name: Parse early-phase (bootstrap) secrets
      no_log: '{{ hide_sensitive_output }}'
      parse_secrets_info:
        values_secrets_plaintext: "{{ values_secrets_data }}"
        secrets_backing_store: "{{ secrets_backing_store }}"
        secrets_phase: early
      register: secrets_results_early

    - name: Parse late-phase secrets
      no_log: '{{ hide_sensitive_output }}'
      parse_secrets_info:
        values_secrets_plaintext: "{{ values_secrets_data }}"
        secrets_backing_store: "{{ secrets_backing_store }}"
        secrets_phase: late
      register: secrets_results_late

    - name: Assemble secrets display (early and late phases)
      ansible.builtin.set_fact:
        secrets_display_by_phase:
          vault_policies: "{{ secrets_results_early.vault_policies }}"
          secret_store_namespace: "{{ secrets_results_late.secret_store_namespace }}"
          early_phase:
            parsed_secrets: "{{ secrets_results_early.parsed_secrets }}"
            kubernetes_secret_objects: "{{ secrets_results_early.kubernetes_secret_objects }}"
            unique_vault_prefixes: "{{ secrets_results_early.unique_vault_prefixes }}"
          late_phase:
            parsed_secrets: "{{ secrets_results_late.parsed_secrets }}"
            kubernetes_secret_objects: "{{ secrets_results_late.kubernetes_secret_objects }}"
            unique_vault_prefixes: "{{ secrets_results_late.unique_vault_prefixes }}"

    - name: Display secrets data (early and late phases)
      ansible.builtin.debug:
        var: secrets_display_by_phase
