---
- name: Install pattern (using pattern-install chart)
  hosts: localhost
  connection: local
  gather_facts: false

  roles:
    - role: pattern_settings # set general pattern vars
    - role: install_settings # set pattern-install specific vars
    - role: validate_prereq # ensure installation dependencies are present
    - role: validate_cluster # ensure a cluster is connected and has a default storage class
    - role: pattern_install_template # render the pattern-install helm chart

  tasks:
    - name: Origin validation (optional, controlled by DISABLE_VALIDATE_ORIGIN / disable_validate_origin)
      block:
        - name: Resolve disable_validate_origin flag
          ansible.builtin.set_fact:
            disable_validate_origin: >-
              {{
                disable_validate_origin | default(
                  lookup('env', 'DISABLE_VALIDATE_ORIGIN') or 'false',
                  true
                ) | bool
              }}

        - name: Validate origin (remote/branch must exist)
          ansible.builtin.include_role:
            name: validate_origin
          when: not disable_validate_origin

    - name: Apply rendered pattern-install chart manifests
      block:
        - name: Apply manifests via native k8s module
          kubernetes.core.k8s:
            definition: "{{ pattern_install_rendered_yaml }}"
            state: present
          register: _apply
          retries: 10
          delay: 15
          until: not _apply.failed

        - name: Print success message
          ansible.builtin.debug:
            msg: |
              Installation of {{ pattern_name }} succeeded!

      rescue:
        - name: Print failure summary
          ansible.builtin.fail:
            msg: |
              Failed to install pattern after 10 retries.
              Error: {{ _apply.error | default(_apply.msg) | default('Unknown error') }}

    # Bootstrap-tagged secrets in the primary values-secret file run immediately after apply
    # (before full load_secrets and Argo health wait).
    - name: Evaluate secret loader setting for bootstrap timing
      ansible.builtin.set_fact:
        secret_loader_disabled: "{{ values_global.global.secretLoader.disabled | default(false) | bool }}"

    - name: Run cluster pre-check and early bootstrap from primary file after pattern apply
      when: not secret_loader_disabled
      block:
        - name: Run cluster pre-check before bootstrap
          ansible.builtin.include_role:
            name: cluster_pre_check

        - name: Remember cluster pre-check completed (avoid duplicate in load_secrets)
          ansible.builtin.set_fact:
            vp_cluster_pre_check_done: true

        - name: Early inject of bootstrap-tagged secrets from primary values-secret
          ansible.builtin.include_role:
            name: load_secrets
            tasks_from: early_bootstrap_from_primary.yml

        - name: Remember early bootstrap inject for duplicate skip in load_secrets
          ansible.builtin.set_fact:
            vp_early_primary_bootstrap_done: "{{ vp_early_primary_file_loaded | default(false) | bool }}"
