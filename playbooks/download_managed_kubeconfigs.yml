---
# Download kubeconfigs for ACM managed clusters (same retrieval logic as the former shell script).
# Default output directory is under /tmp (kubeconfigs must not live in the project tree).
#
# Examples:
#   ansible-playbook download_managed_kubeconfigs.yml
#   ansible-playbook download_managed_kubeconfigs.yml -e download_kubeconfigs_cluster=ocp-primary
#   ansible-playbook download_managed_kubeconfigs.yml -e download_kubeconfigs_output_dir=/tmp/kubeconfigs
#   ansible-playbook download_managed_kubeconfigs.yml -e download_kubeconfigs_force=true
#
# Hub auth: use KUBECONFIG (or default ~/.kube/config) like other playbooks in this repo.
- name: Download managed cluster kubeconfigs from ACM hub
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    download_kubeconfigs_output_dir: /tmp/kubeconfigs
    download_kubeconfigs_cluster: ""
    download_kubeconfigs_force: false
  tasks:
    - name: Ensure output directory exists
      ansible.builtin.file:
        path: "{{ download_kubeconfigs_output_dir }}"
        state: directory
        mode: "0700"

    - name: List ManagedClusters on hub
      kubernetes.core.k8s_info:
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
      register: mc_list

    - name: Fail when hub or ACM is not reachable
      ansible.builtin.fail:
        msg: Not connected to a hub cluster or ACM is not installed (ManagedCluster list failed).
      when: mc_list.failed | default(false) or not mc_list.api_found | default(false)

    - name: Build managed cluster name list
      ansible.builtin.set_fact:
        all_mc_names: "{{ mc_list.resources | map(attribute='metadata.name') | list }}"

    - name: Validate requested cluster exists
      when: download_kubeconfigs_cluster | length > 0
      ansible.builtin.assert:
        that:
          - download_kubeconfigs_cluster in all_mc_names
        fail_msg: "Cluster '{{ download_kubeconfigs_cluster }}' not found in managed clusters"

    - name: Set clusters to process
      ansible.builtin.set_fact:
        clusters_to_process: >-
          {{
            ([download_kubeconfigs_cluster] if download_kubeconfigs_cluster | length > 0
             else all_mc_names) | reject('equalto', 'local-cluster') | list
          }}

    - name: Report when no clusters to process
      when: clusters_to_process | length == 0
      ansible.builtin.debug:
        msg: No managed clusters to process (empty list or only local-cluster).

    - name: End when nothing to do
      ansible.builtin.meta: end_play
      when: clusters_to_process | length == 0

    - name: Download kubeconfig per cluster
      ansible.builtin.include_tasks: tasks/download_kubeconfig_cluster.yml
      loop: "{{ clusters_to_process }}"
      loop_control:
        loop_var: cluster_name

    - name: List kubeconfig files in output directory
      ansible.builtin.find:
        paths: "{{ download_kubeconfigs_output_dir }}"
        patterns: "*.yaml"
      register: kubeconfig_files

    - name: Summary
      ansible.builtin.debug:
        msg:
          - "Output directory: {{ download_kubeconfigs_output_dir }}"
          - "YAML files present: {{ kubeconfig_files.matched }}"
