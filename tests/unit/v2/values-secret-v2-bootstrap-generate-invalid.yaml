version: "2.0"

backingStore: vault

vaultPolicies:
  basicPolicy: "length=10\nrule \"charset\" { charset = \"abcdefghijklmnopqrstuvwxyz\" min-chars = 1 }\n"

secrets:
  - name: bad-bootstrap
    bootstrap: true
    targetNamespaces:
      - openshift-gitops
    fields:
      - name: secret
        onMissingValue: generate
        vaultPolicy: basicPolicy
