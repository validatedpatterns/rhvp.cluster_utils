version: "2.0"
backingStore: vault

bootstrap_secrets:
  - name: boot-without-ns
    vaultPrefixes:
      - hub
    fields:
      - name: k
        value: v
        onMissingValue: error

secrets:
  - name: late-ok
    vaultPrefixes:
      - hub
    fields:
      - name: k2
        value: v2
        onMissingValue: error
