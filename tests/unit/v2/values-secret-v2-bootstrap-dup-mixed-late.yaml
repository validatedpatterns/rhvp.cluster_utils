version: "2.0"
backingStore: vault

bootstrap_secrets:
  - name: shared-name
    targetNamespaces:
      - default
    vaultPrefixes:
      - hub
    fields:
      - name: from_bootstrap
        value: bootval
        onMissingValue: error

secrets:
  - name: shared-name
    vaultPrefixes:
      - hub
    fields:
      - name: from_secrets_section
        value: should_not_apply_in_late_parse
        onMissingValue: error
  - name: late-unique
    vaultPrefixes:
      - hub
    fields:
      - name: only_late
        value: lateval
        onMissingValue: error
