version: "2.0"

backingStore: vault

vaultPolicies:
  basicPolicy: "length=10\nrule \"charset\" { charset = \"abcdefghijklmnopqrstuvwxyz\" min-chars = 1 }\n"

secrets:
  - name: boot-token
    bootstrap: true
    targetNamespaces:
      - openshift-gitops
    fields:
      - name: token
        value: inline-bootstrap-value
        onMissingValue: error

  - name: main-vault-secret
    vaultPrefixes:
      - hub
    fields:
      - name: secret
        onMissingValue: generate
        vaultPolicy: basicPolicy
