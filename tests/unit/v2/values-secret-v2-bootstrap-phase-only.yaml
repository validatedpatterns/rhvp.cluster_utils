version: "2.0"

vaultPolicies:
  basicPolicy: "length=10\nrule \"charset\" { charset = \"abcdefghijklmnopqrstuvwxyz\" min-chars = 1 }\n"

secrets:
  - name: boot-token
    bootstrap: true
    targetNamespaces:
      - openshift-gitops
    fields:
      - name: token
        value: inline-bootstrap-value
        onMissingValue: error

  - name: early-only-token
    bootstrap: only
    targetNamespaces:
      - openshift-config
    fields:
      - name: key
        value: early-only-inline
        onMissingValue: error
