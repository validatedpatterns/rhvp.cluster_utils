version: "2.0"

backingStore: vault

vaultPolicies:
  basicPolicy: |
    length=10
    rule "charset" { charset = "abcdefghijklmnopqrstuvwxyz" min-chars = 1 }

bootstrap_secrets:
  - name: bootstrap-only
    targetNamespaces:
      - default
    vaultPrefixes:
      - hub
    fields:
      - name: bootval
        value: bootsecret
        onMissingValue: error

secrets:
  - name: late-only
    vaultPrefixes:
      - hub
    fields:
      - name: lateval
        value: latesecret
        onMissingValue: error
